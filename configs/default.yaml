seed: 42
img_size: 256
batch_size: 32
num_workers: 4
val_split: 0.15
amp: true

optimizer:
  name: AdamW
  lr: 1.0e-4
  weight_decay: 1.0e-4

scheduler:
  name: cosine
  warmup_epochs: 2

augment:
  hflip: true
  rotation: 15
  color_jitter: [0.2, 0.2, 0.2, 0.1]

data:
  root: data
  train_subdir: train
  test_subdir: test
